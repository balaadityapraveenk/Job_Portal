services:
  # 1. Spring Boot Backend (Web Service via Docker)
  - type: web
    name: job-portal-springboot-dbs
    env: docker
    plan: free
    rootDir: backend2
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://jobportal-db-dbs:5432/jobportal
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: jobportal-db-dbs
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: jobportal-db-dbs
          property: password
      - key: SPRING_DATA_MONGODB_URI
        value: mongodb+srv://admin:admin@cluster0.b0ao2kv.mongodb.net/jobportal?appName=Cluster0

  # 2. FastAPI Gateway (Web Service)
  - type: web
    name: job-portal-gateway-dbs
    env: python
    plan: free
    rootDir: FastAPI
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SPRING_URL
        fromService:
          name: job-portal-springboot-dbs
          type: web
          property: host

  # 3. Alternative Node.js Backend (Web Service)
  - type: web
    name: job-portal-node-backend-dbs
    env: node
    plan: free
    rootDir: node-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8000
      - key: MONGODB_URI
        value: mongodb+srv://admin:admin@cluster0.b0ao2kv.mongodb.net/jobportal?appName=Cluster0
      - key: JWT_SECRET
        generateValue: true

  # 4. React Frontend (Static Site)
  - type: web
    name: job-portal-frontend-dbs
    runtime: static
    rootDir: project
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  # 5. PostgreSQL Database Service
  - name: jobportal-db-dbs
    databaseName: jobportal
    user: postgres_user
    plan: free
